<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Movie Recommendation System</h1>
        <p class="text-center text-muted mb-5">Enter a movie title to get personalized recommendations based on content similarity!</p>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <form id="recForm">
                            <div class="mb-3">
                                <label for="movieTitle" class="form-label">Movie Title:</label>
                                <input type="text" class="form-control" id="movieTitle" placeholder="e.g., Inception" list="titleList" autocomplete="off">
                                <datalist id="titleList">
                                    {% for title in titles %}
                                    <option value="{{ title }}">
                                    {% endfor %}
                                </datalist>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Get Recommendations</button>
                        </form>

                        <div id="movieBanner" class="mt-4 rounded banner-card p-4" style="display: none;">
                            <h5 id="bannerTitle" class="mb-2"></h5>
                            <p id="bannerTagline" class="text-muted mb-2"></p>
                            <p id="bannerMeta" class="small mb-3"></p>
                            <p id="bannerOverview" class="mb-0"></p>
                        </div>
                        
                        <div id="results" class="mt-4" style="display: none;">
                            <h5>Recommended Movies:</h5>
                            <div id="recList" class="list-group"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
